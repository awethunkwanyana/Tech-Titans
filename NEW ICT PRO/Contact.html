<body >
<div class="container">
  <form id="contactForm">
    
    <label>Username:</label>
    <input type="text" id="username" required><br><br>

    <label>Email:</label>
    <input type="email" id="email" placeholder="username@gmail.com" required><br><br>

    <label>Comment:</label>
    <textarea id="comment" rows="4" required></textarea><br><br>

    <div class="btn-group">
      <button type="button" onclick="resetForm()">Reset</button>
      <button type="submit">Submit</button>
    </div>

  </form>
</div>

<script>
  // Reset function
  function resetForm() {
    document.getElementById("contactForm").reset();
  }

  // Submit handling
  document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let username = document.getElementById("username").value;
    let email = document.getElementById("email").value;
    let comment = document.getElementById("comment").value;

    if (username && email && comment) {
      alert("Form submitted successfully We Will Get Back To You In Due Time!\n\n" +
            "Username: " + username +
            "\nEmail: " + email +
            "\Thanks For The Comment: " + comment);
    } else {
      alert("Please fill in all fields.");
    }
  });
</script>
